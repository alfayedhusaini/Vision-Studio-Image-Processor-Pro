<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Webcam Efek Citra</title>
<style>
* { box-sizing: border-box; font-family: "Segoe UI", Arial, sans-serif; }
body { background: linear-gradient(135deg, #e3f2fd, #f9f9f9); margin: 0; padding: 20px; min-height: 100vh; }
.container { width: 95%; max-width: 1400px; margin: 20px auto; background: #ffffff; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
h2 { color: #0d47a1; margin: 10px 0; }
h4 { color: #555; font-weight: 400; margin: 10px 0 25px 0; }
.workspace { display: flex; flex-wrap: wrap; justify-content: space-around; align-items: flex-start; margin-top: 20px; }
.cam-box, .result-box { flex: 1; min-width: 350px; margin: 15px; padding: 15px; background: #fcfcfc; border-radius: 10px; border: 1px solid #e0e0e0; }
video { width: 100%; max-width: 500px; height: auto; border-radius: 12px; border: 2px solid #1976d2; background: #000; }
.result-box img { width: 100%; max-width: 500px; height: auto; border-radius: 10px; border: 2px solid #2e7d32; padding: 5px; background: #f5f5f5; }
.controls { margin-top: 20px; }
select, button, .btn-download { padding: 12px 18px; margin: 6px; border-radius: 8px; border: 1px solid #ccc; font-size: 15px; display: inline-block; text-decoration: none; }
button { background: #1976d2; color: #fff; border: none; cursor: pointer; transition: 0.3s; }
button:hover { background: #0d47a1; }
.btn-download { background: #2e7d32; color: white; border: none; font-weight: bold; }
.btn-download:hover { background: #1b5e20; }
.back-btn { background: #9e9e9e; }
.back-btn:hover { background: #616161; }
</style>
</head>
<body>
<div class="container">
    <h2>VISION STUDIO</h2>
    <h4>sistem pemroses efek citra real-time digital (Webcam)</h4>
    <div class="workspace">
        <div class="cam-box"><video id="v" autoplay></video></div>
        <div class="result-box">
            <div id="out">
                <p style="color: #999; margin-top: 40px;">Hasil potret ber-efek akan muncul di sini...</p>
            </div>
        </div>
    </div>
    <canvas id="c" width="640" height="480" style="display:none"></canvas>
    <div class="controls">
        <label>Pilih Efek:</label>
        <select id="op" onchange="applyLiveFilter()">
            <option value="none">Normal</option>
            <option value="grayscale">Abu-abu</option>
            <option value="blur">Buram</option>
            <option value="brightness">Cerah</option>
            <option value="threshold">Batas Ambang</option>
            <option value="invert">Negatif</option>
            <option value="sepia">Sepia</option>
            <option value="contrast">Kontras Tinggi</option>
            <option value="edge">Deteksi Tepi</option>
            <option value="sharpen">Pertajam</option>
        </select>
    </div>
    <div class="controls">
        <button onclick="takeAndProcess()">Potret</button>
        <button class="back-btn" onclick="location.href='/'">Kembali</button>
    </div>
</div>
<script>
const v = document.getElementById('v'), c = document.getElementById('c'), op = document.getElementById('op'), outDiv = document.getElementById('out');

navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } })
.then(s => v.srcObject = s)
.catch(err => alert("Webcam tidak terdeteksi atau izin ditolak."));

function applyLiveFilter() {
    let f = "none";
    if (op.value==='grayscale') f="grayscale(100%)";
    else if (op.value==='blur') f="blur(5px)";
    else if (op.value==='brightness') f="brightness(1.5)";
    else if (op.value==='threshold') f="contrast(1000%) grayscale(100%)";
    else if (op.value==='invert') f="invert(100%)";
    else if (op.value==='sepia') f="sepia(100%)";
    else if (op.value==='contrast') f="contrast(200%)";
    else if (op.value==='edge') f="contrast(1000%) grayscale(100%) invert(100%)";
    else if (op.value==='sharpen') f="contrast(120%) saturate(120%)";
    v.style.filter = f;
}

async function takeAndProcess() {
    const ctx = c.getContext('2d');
    ctx.drawImage(v, 0, 0, 640, 480);
    const rawSnap = c.toDataURL('image/png');
    outDiv.innerHTML = "<p>Sedang memproses efek...</p>";
    try {
        const response = await fetch('/save_webcam', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ imageData: rawSnap, operation: op.value })
        });
        const data = await response.json();
        outDiv.innerHTML = `
            <img src="${data.url}"><br><br>
            <a href="${data.url}" class="btn-download" download="webcam_efek_citra.png">Download Gambar</a>
        `;
    } catch (err) {
        outDiv.innerHTML = "<p style='color:red;'>Gagal memproses gambar dari webcam.</p>";
    }
}
</script>
</body>
</html>
